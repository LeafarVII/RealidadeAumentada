<script src="JS/aframe.min.js"></script>
<script src="JS/aframe-ar.js"></script>


	<body style='margin : 0px; overflow: hidden;'>

		<!--<a-scene embedded arjs='sourceType: webcam; debugUIEnabled: true'>-->
			<a-scene embedded arjs>

			<a-marker
				type='pattern' url='asset/pattern-markerCar.patt'>
					<a-entity 
						obj-model="obj: url(Asset/bugatti.obj); mtl:url(Asset/bugatti.mtl)" 
						scale="0.2 0.2 0.2">
					</a-entity>
			</a-marker>

			<a-marker
			type='pattern' url='asset/pattern-markerRenault.patt'>
				<a-entity 
					obj-model="obj: url(Asset/Renault1906.obj); mtl:url(Asset/Renault1906.mtl)" 
					scale="1 1 1">
				</a-entity>
			</a-marker>

		<a-entity camera></a-entity>
		</a-scene>
			
	</body>
